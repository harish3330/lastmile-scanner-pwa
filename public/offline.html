<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2196F3" />
  <title>Offline - Last-Mile Scanner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 500px;
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .info-box {
      background-color: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 15px;
      margin: 25px 0;
      text-align: left;
    }

    .info-box p {
      font-size: 14px;
      color: #555;
      margin: 8px 0;
    }

    button {
      background-color: #ff9800;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-top: 20px;
    }

    button:hover {
      background-color: #f57c00;
    }

    button:active {
      transform: scale(0.98);
    }

    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #f44336;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌐</div>
    <h1>You are Offline</h1>
    <p>
      Your internet connection is currently unavailable. The app is using
      cached data.
    </p>

    <div class="info-box">
      <p>
        <span class="status-indicator"></span>
        <strong>Offline Mode Enabled:</strong> The app will continue to work
        with cached data.
      </p>
      <p>
        Pending operations will be synchronized automatically when your
        connection returns.
      </p>
    </div>

    <button onclick="location.reload()">Reload Page</button>
  </div>

  <script>
    // Check if connection is restored
    window.addEventListener('online', () => {
      console.log('Connection restored');
      // Wait a moment for service worker to detect the change
      setTimeout(() => {
        location.reload();
      }, 500);
    });

    // Log offline event
    window.addEventListener('offline', () => {
      console.log('Connection lost');
    });
  </script>
</body>
</html>
